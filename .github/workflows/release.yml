name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASES_REPO: TSchonleber/snipebundle-releases

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust-targets: ""
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust-targets: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"
          shared-key: tauri-${{ matrix.platform }}

      - name: linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: regenerate icons (linux/windows)
        if: matrix.platform != 'macos-latest'
        run: |
          python3 tools/gen_icons.py

      - name: regenerate icons + icns (macos)
        if: matrix.platform == 'macos-latest'
        run: |
          python3 tools/gen_icons.py
          cd apps/desktop/src-tauri/icons
          mkdir -p icon.iconset
          for spec in "16 16x16" "32 16x16@2x" "32 32x32" "64 32x32@2x" "128 128x128" "256 128x128@2x" "256 256x256" "512 256x256@2x" "512 512x512" "1024 512x512@2x"; do
            read px name <<< "$spec"
            sips -z "$px" "$px" source.png --out "icon.iconset/icon_${name}.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset

      - name: install npm deps
        run: pnpm install --no-frozen-lockfile

      - name: build tauri (no publish)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          # Build only — we publish to the public releases repo in a later
          # step using the RELEASES_REPO_PAT secret. Setting tagName empty
          # prevents tauri-action from creating a release in this repo.
          args: ${{ matrix.args }}

      - name: collect artifacts
        shell: bash
        run: |
          mkdir -p _artifacts
          shopt -s nullglob globstar
          for f in apps/desktop/src-tauri/target/**/release/bundle/**/*; do
            case "$f" in
              *.msi|*.exe|*.dmg|*.AppImage|*.deb|*.rpm|*.app.tar.gz)
                cp "$f" _artifacts/
                ;;
            esac
          done
          ls -la _artifacts || true

      - name: upload artifacts (intra-job)
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: _artifacts/*
          if-no-files-found: warn

  publish:
    name: publish releases + R2
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: _all_artifacts
          pattern: installers-*
          merge-multiple: true

      - name: list collected
        run: ls -la _all_artifacts || true

      - name: publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_PAT }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::RELEASES_REPO_PAT secret not set. Add a fine-scoped PAT with contents:write on $RELEASES_REPO."
            exit 1
          fi
          notes_file=$(mktemp)
          cat > "$notes_file" <<EOF
          ## snipebundle $TAG

          Download the installer for your OS:

          - **Windows**: \`snipebundle-setup.msi\` (or \`snipebundle_*-setup.exe\`)
          - **macOS**: \`snipebundle.dmg\`
          - **Linux**: \`snipebundle.AppImage\` or \`snipebundle.deb\`

          See [snipebundle.app](https://snipebundle.app) for setup instructions.

          Source code is private; this repo only hosts the public installers.
          EOF
          gh release create "$TAG" \
            --repo "$RELEASES_REPO" \
            --title "snipebundle $TAG" \
            --notes-file "$notes_file" \
            _all_artifacts/* || \
          gh release upload "$TAG" --repo "$RELEASES_REPO" --clobber _all_artifacts/*

      - name: upload to Cloudflare R2 (optional)
        if: env.R2_ACCOUNT_ID != '' && env.R2_BUCKET != ''
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          for f in _all_artifacts/*; do
            base=$(basename "$f")
            aws s3 cp "$f" "s3://${R2_BUCKET}/${TAG}/${base}" --endpoint-url "$ENDPOINT"
            aws s3 cp "$f" "s3://${R2_BUCKET}/latest/${base}" --endpoint-url "$ENDPOINT"
          done
